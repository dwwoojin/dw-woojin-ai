<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>생산2팀 FIFO 대시보드 - 최종수정본</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700;900&display=swap');
        body { font-family: 'Pretendard', sans-serif; background-color: #f1f5f9; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        .kanban-col { flex: 1; display: flex; flex-direction: column; background: #ebf0f5; border-radius: 8px; min-width: 280px; border: 1px solid #d1d5db; }
        .lot-list { flex: 1; overflow-y: auto; padding: 12px; }
        .lot-card { background: white; border-radius: 6px; padding: 12px; margin-bottom: 10px; border: 2px solid #e2e8f0; }
        .border-danger { border-color: #ef4444; background-color: #fef2f2; }
        .border-warning { border-color: #f59e0b; background-color: #fffbeb; }
        .border-safe { border-color: #10b981; }
    </style>
</head>
<body>

    <header class="bg-[#1a1c2e] text-white px-6 py-3 flex justify-between items-center shadow-lg">
        <h1 class="text-xl font-bold"><i class="fas fa-warehouse text-blue-400 mr-2"></i> 생산2팀 FIFO 관리 대시보드</h1>
        <button onclick="fetchData()" class="bg-indigo-600 px-4 py-2 rounded text-xs font-bold flex items-center gap-2">
            <i class="fas fa-sync-alt" id="refresh-icon"></i> 데이터 동기화
        </button>
    </header>

    <main class="flex-1 flex gap-4 p-4 overflow-hidden" id="board-container">
        <div class="w-full text-center py-20 text-slate-400">시트 데이터를 불러오는 중입니다... 잠시만 기다려 주세요.</div>
    </main>

    <script>
        const DATA_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTxJoIbArdj4_BDnV6wxNgLd3k55kbagI1rIdqqBBW5WMb63lHFh3K-UWoPpBwbUeRXjt9B5ieNXa05/pub?gid=738426718&single=true&output=csv";
        
        const LIMITS = { 1: 30, 2: 45, 3: 45, 4: 60 };

        function fetchData() {
            const icon = document.getElementById('refresh-icon');
            icon.classList.add('fa-spin');
            
            Papa.parse(DATA_URL, {
                download: true,
                header: true,
                skipEmptyLines: true,
                complete: function(results) {
                    console.log("불러온 데이터:", results.data); // 데이터 확인용 콘솔로그
                    if(results.data.length > 0) {
                        render(results.data);
                    } else {
                        alert("데이터가 비어있습니다. 시트 내용을 확인하세요.");
                    }
                    icon.classList.remove('fa-spin');
                },
                error: function(err) {
                    console.error("에러 발생:", err);
                    alert("데이터 로딩 실패! 웹 게시 상태를 확인하세요.");
                }
            });
        }

        function render(data) {
            const container = document.getElementById('board-container');
            container.innerHTML = `
                <div class="kanban-col"><div class="py-2 text-center font-bold text-blue-700 bg-blue-50 border-b-2 border-blue-400">1. 과립 완료</div><div id="col-1" class="lot-list"></div></div>
                <div class="kanban-col"><div class="py-2 text-center font-bold text-purple-700 bg-purple-50 border-b-2 border-purple-400">2. 타정 완료</div><div id="col-2" class="lot-list"></div></div>
                <div class="kanban-col"><div class="py-2 text-center font-bold text-teal-700 bg-teal-50 border-b-2 border-teal-400">3. 코팅 완료</div><div id="col-3" class="lot-list"></div></div>
                <div class="kanban-col"><div class="py-2 text-center font-bold text-orange-700 bg-orange-50 border-b-2 border-orange-400">4. 선별/포장 대기</div><div id="col-4" class="lot-list"></div></div>
            `;

            const cols = [1, 2, 3, 4].map(i => document.getElementById(`col-${i}`));

            data.forEach(row => {
                // 열 제목이 달라도 키워드로 찾아내는 로직
                let name = "", lot = "", proc = "", elapsed = 0;
                for (let key in row) {
                    let k = key.replace(/\s/g, ""); // 공백 제거
                    if (k.includes("제품")) name = row[key];
                    if (k.includes("제조") || k.includes("LOT")) lot = row[key];
                    if (k.includes("공정") && !k.includes("경과")) proc = row[key];
                    if (k.includes("경과")) elapsed = parseInt(row[key]) || 0;
                }

                if (!name || name.trim() === "") return;

                let colIdx = 0;
                if (proc.includes('과립')) colIdx = 1;
                else if (proc.includes('타정')) colIdx = 2;
                else if (proc.includes('코팅')) colIdx = 3;
                else if (proc.includes('선별') || proc.includes('충전') || proc.includes('포장')) colIdx = 4;

                if (colIdx > 0) {
                    const limit = LIMITS[colIdx];
                    const remaining = limit - elapsed;
                    let statusClass = 'border-safe', textColor = 'text-green-600';
                    if (remaining <= 7) { statusClass = 'border-danger'; textColor = 'text-red-600'; }
                    else if (remaining <= 14) { statusClass = 'border-warning'; textColor = 'text-yellow-600'; }

                    const card = `
                        <div class="lot-card ${statusClass}">
                            <div class="flex justify-between items-start">
                                <h4 class="font-bold text-slate-800 text-sm">${name}</h4>
                                <span class="text-lg font-black ${textColor}">D-${remaining}</span>
                            </div>
                            <div class="flex justify-between text-[10px] mt-1 text-slate-500">
                                <span>Lot: ${lot}</span>
                                <span>${elapsed}일 경과</span>
                            </div>
                        </div>`;
                    cols[colIdx-1].insertAdjacentHTML('beforeend', card);
                }
            });
        }
        window.onload = fetchData;
    </script>
</body>
</html>
